server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing : toute route inconnue renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend — évite les problèmes CORS en local Docker
    # Le browser appelle /api/v1/..., nginx forwarde vers http://backend:8000/api/v1/...
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache statique pour les assets compilés
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
