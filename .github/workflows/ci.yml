name: CI

on:
  push:
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Backend — qualité du code
  # ---------------------------------------------------------------------------
  backend-quality:
    name: Backend · Qualité (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lint (ruff check)
        run: ruff check app/

      - name: Format (ruff format --check)
        run: ruff format --check app/

      - name: Types (mypy)
        run: mypy app/

  # ---------------------------------------------------------------------------
  # Backend — tests
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend · Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Entraîner les modèles
        run: python -m scripts.train_models

      - name: Tests
        run: pytest

  # ---------------------------------------------------------------------------
  # Frontend — qualité du code
  # ---------------------------------------------------------------------------
  frontend-quality:
    name: Frontend · Qualité (eslint + prettier + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format (prettier --check)
        run: npm run format:check

      - name: Types (tsc)
        run: npx tsc -p tsconfig.app.json

  # ---------------------------------------------------------------------------
  # Frontend — tests
  # ---------------------------------------------------------------------------
  frontend-tests:
    name: Frontend · Tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Tests
        run: npm run test:run
